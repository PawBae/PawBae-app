name: release

# Builds distributable bundles for macOS (Apple Silicon + Intel DMG) and
# Windows (NSIS setup.exe).
#
# - Tag push (v*): builds and uploads everything to a DRAFT GitHub Release.
#   Review the draft, then publish it manually (see docs/RELEASING.md).
#   macOS bundles are Developer ID signed + notarized (hard gate: missing
#   Apple secrets refuse the tag build); Windows stays unsigned for v1.
# - workflow_dispatch: builds only and uploads workflow artifacts — use this
#   to verify the pipeline without cutting a release.
#
# The in-app updater does NOT read GitHub's latest.json (uploadUpdaterJson is
# off); it reads https://pawbae.ai/update/latest.json, which is updated by
# hand after the release is published. See docs/RELEASING.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Use fast temp disk
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force D:\cargo-target
          echo "CARGO_TARGET_DIR=D:\cargo-target" >> $env:GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 更新器验签红线：占位公钥/缺失签名密钥的状态下拒绝出正式版本，
      # 否则会发出一个永远无法通过验签的更新器（docs/RELEASING.md「更新器签名」）。
      - name: updater signing preflight
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          HAS_MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        run: |
          if grep -q PLACEHOLDER apps/desktop/src-tauri/updater-pubkey.pub; then
            echo "::error::updater-pubkey.pub 仍是占位符 — 先按 docs/RELEASING.md 生成密钥对"
            exit 1
          fi
          if [ "$HAS_MINISIGN_KEY" != "true" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret 缺失 — 无法为发布资产签名"
            exit 1
          fi

      # macOS 签名红线：正式版本必须签名 + 公证——被 Gatekeeper 拦住的首启
      # 体验等于没发。六个 Apple secrets 缺一即拒（docs/RELEASING.md
      # 「macOS 签名与公证」有逐个 secret 的配置走查）。
      - name: apple signing preflight
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        shell: bash
        env:
          HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
          HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD != '' }}
          HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
        run: |
          fail=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            flag="HAS_${name}"
            if [ "$(eval "printf '%s' \"\$$flag\"")" != "true" ]; then
              echo "::error::${name} secret 缺失 — 按 docs/RELEASING.md「macOS 签名与公证」补齐"
              fail=1
            fi
          done
          exit "$fail"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: false # reuse the cache built by ci.yml on main; don't evict it

      - run: pnpm install --frozen-lockfile

      # Apple 签名凭据入构建环境——仅当已配置。不能无条件放进 tauri-action 的
      # env：空字符串也算「已设置」，会把 tauri bundler 误带进签名流程；这样
      # workflow_dispatch 冒烟在 secrets 缺席时照旧产出未签名包（tag 构建
      # 由上面的 preflight 拒绝）。tauri 自己负责临时 keychain 的导入与清理。
      - name: export apple signing env
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Apple secrets 未配置——本次构建不签名（正式版本会被 preflight 拒绝）"
            exit 0
          fi
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            {
              echo "${name}<<PAWBAE_SECRET_EOF"
              eval "printf '%s\n' \"\$$name\""
              echo "PAWBAE_SECRET_EOF"
            } >> "$GITHUB_ENV"
          done
          echo "Apple 签名凭据已入环境：tauri 将签名 + 公证 macOS 产物"

      # NOTE: the published major tag is v0 (currently v0.6.x) — there is no v1
      # tag even though upstream README examples show one.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Aptabase telemetry app key, baked in at compile time. Missing secret
          # (e.g. forks) resolves to "" and the app builds with telemetry
          # disabled entirely — see src-tauri/src/lib.rs.
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
          # Supabase 平台凭据（登录流）。publishable key 公开设计，放仓库
          # Variables 而非 secrets；缺失时账号区显示「云端未配置」，App 照常构建。
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          # macOS 签名 + 公证凭据经上面「export apple signing env」按需注入
          # $GITHUB_ENV，不在这里直挂（空值防线）。
        with:
          projectPath: apps/desktop
          # On tag pushes: create/update a draft release. On manual runs the
          # empty tagName skips the release and the step below uploads
          # workflow artifacts instead.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PawBae {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          # 注意输入名随 tauri-action 升级过：老的 uploadUpdaterJson /
          # uploadWorkflowArtifacts 会被静默忽略（只报 warning）。
          includeUpdaterJson: false # custom updater reads pawbae.ai, not GitHub latest.json
          args: ${{ matrix.args }}

      # 冒烟构建的产物出口：tauri-action 现版本没有 workflow-artifact 输入，
      # dispatch 运行（tagName 为空、release 上传被跳过）需要自己上传，
      # 否则签名/公证验证无包可下。tag 构建产物走 draft release，不重复传。
      # 按平台分两步：workspace 相对路径和 D:\ 绝对路径混在一个 path 里会让
      # upload-artifact 的公共根目录推导出错（rootDirectory is not a parent）。
      - name: upload workflow artifacts (smoke builds, macOS)
        if: github.event_name == 'workflow_dispatch' && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}-${{ strategy.job-index }}
          retention-days: 7
          if-no-files-found: error
          path: apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg

      - name: upload workflow artifacts (smoke builds, Windows)
        if: github.event_name == 'workflow_dispatch' && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}-${{ strategy.job-index }}
          retention-days: 7
          if-no-files-found: error
          # fast temp disk 重定向后产物在 CARGO_TARGET_DIR（D:\cargo-target）
          path: ${{ env.CARGO_TARGET_DIR }}\release\bundle\nsis\*.exe

  # 给发布资产做 minisign 签名（更新器安装前验签的另一半）。
  # 产出：每个 dmg/exe/msi 一个 .minisig 上传回 release + Step Summary 里
  # 给出 latest.json 直接粘贴用的 "signature" 字段值。
  sign:
    name: minisign release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: install minisign
        run: sudo apt-get update -qq && sudo apt-get install -y -qq minisign

      - name: download draft release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # 草稿 release 不出现在 releases/tags/<tag> 端点，走列表按 tag_name 匹配
          rel_id=$(gh api "repos/$REPO/releases?per_page=30" \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          if [ -z "$rel_id" ]; then
            echo "::error::找不到 tag=$TAG 对应的 release（草稿也没有）"
            exit 1
          fi
          echo "RELEASE_ID=$rel_id" >> "$GITHUB_ENV"
          mkdir -p assets
          gh api "repos/$REPO/releases/$rel_id/assets?per_page=100" \
            --jq '.[] | select(.name | test("\\.(dmg|exe|msi)$")) | "\(.id)\t\(.name)"' |
          while IFS=$'\t' read -r id name; do
            echo "downloading $name"
            gh api -H "Accept: application/octet-stream" \
              "repos/$REPO/releases/assets/$id" > "assets/$name"
          done
          if [ -z "$(ls -A assets)" ]; then
            echo "::error::release 里没有 dmg/exe/msi 资产可签名"
            exit 1
          fi
          ls -la assets

      - name: sign assets
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          for f in assets/*; do
            name=$(basename "$f")
            # -W：密钥按 docs/RELEASING.md 用 -W 生成（无口令，只存于 GitHub secrets）
            minisign -S -W -s minisign.key -x "$f.minisig" \
              -t "PawBae $TAG $name" -m "$f"
          done
          rm -f minisign.key
          ls -la assets

      - name: upload signatures to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # 幂等：重跑时先删掉已存在的 .minisig 资产
          gh api "repos/$REPO/releases/$RELEASE_ID/assets?per_page=100" \
            --jq '.[] | select(.name | endswith(".minisig")) | .id' |
          while read -r id; do
            gh api --method DELETE "repos/$REPO/releases/assets/$id"
          done
          for f in assets/*.minisig; do
            name=$(basename "$f")
            echo "uploading $name"
            gh api --method POST \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$name" \
              --input "$f" > /dev/null
          done

      - name: signature blocks for latest.json
        run: |
          {
            echo "## latest.json 的 signature 字段（逐资产复制粘贴）"
            for f in assets/*.minisig; do
              name=$(basename "$f" .minisig)
              echo
              echo "**$name**:"
              echo '```json'
              printf '"signature": %s\n' "$(jq -Rs . < "$f")"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"
