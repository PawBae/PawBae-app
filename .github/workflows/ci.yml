name: ci

on:
  pull_request:
    paths:
      - apps/desktop/**
      - packages/shared/**
      - supabase/**
      - package.json
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - biome.json
      - .github/workflows/ci.yml
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short

jobs:
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

  rust-clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use fast temp disk
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force D:\cargo-target
          echo "CARGO_TARGET_DIR=D:\cargo-target" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --all-targets -- -D warnings

  rust-test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use fast temp disk
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force D:\cargo-target
          echo "CARGO_TARGET_DIR=D:\cargo-target" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: svelte-check
        run: pnpm check

      - name: test
        run: pnpm test:ci
